<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intramurals Players</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>

    <style>
        body {
            background-image: url(blue.jpg);
            background-size: cover;
            background-attachment: fixed;
        }
        nav {
            background-color: white;
        }
        .card {
            width: 350px;
            margin-top: 120px;
        }
        #output {
            margin-top: 15px;
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #fff;
            padding: 10px;
            text-align: left;
        }
        h1, h4 {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

<body>

<nav class="navbar navbar-expand-sm navbar-light fixed-top shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold mb-0 h1">Intramurals 2025-2026</span>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link mx-3" href="index.html">Sign Up</a>
            </li>
            <li class="nav-item">
                <a class="nav-link mx-3" href="team.html">Team Checker</a>
            </li>
            <li class="nav-item">
                <a class="nav-link mx-3" href="players.html">List of Players</a>
            </li>
        </ul>
    </div>
</nav>

<div class="d-flex justify-content-center">
    <div class="card p-4 shadow text-center">
        <h4>Intramural Players</h4>

        <button class="btn btn-primary mt-3 w-100" py-click="show_players">Show Players</button>

        <div id="output">
            <p id="output-list"></p>
        </div>
    </div>
</div>

<py-script src="main.py"></py-script>
